<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Cargando demo Bio Call…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f8fafc;
        color: #1e3a5f;
      }
    </style>
  </head>
  <body>
    <p id="status">Cargando borrador de demostración…</p>
    <script>
      const DRAFT_KEY = "biocall_draft";

      fetch("/demo-biocall-draft.json")
        .then((r) => {
          if (!r.ok) throw new Error("No se encontró demo-biocall-draft.json");
          return r.json();
        })
        .then((data) => {
          localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
          location.replace("/");
        })
        .catch((err) => {
          document.getElementById("status").textContent =
            "Error al cargar el demo: " + err.message;
        });
    </script>
  </body>
</html>
